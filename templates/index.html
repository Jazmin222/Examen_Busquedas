<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <title>Sistema de Búsquedas</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{

            background:
            linear-gradient(
                120deg,
                #0f2027,
                #203a43,
                #2c5364
            );

            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            padding:30px;
        }

        .panel{

            width:800px;

            background:white;

            border-radius:25px;

            overflow:hidden;

            box-shadow:0px 15px 40px rgba(0,0,0,0.4);
        }

        .header{

            background:
            linear-gradient(
                135deg,
                #141e30,
                #243b55
            );

            color:white;

            padding:40px;

            text-align:center;
        }

        .header h1{

            font-size:40px;

            margin-bottom:10px;
        }

        .header p{

            font-size:18px;

            opacity:0.9;
        }

        .contenido{

            padding:40px;
        }

        .grupo{

            margin-bottom:25px;
        }

        label{

            display:block;

            margin-bottom:10px;

            font-weight:bold;

            color:#243b55;

            font-size:18px;
        }

        input{

            width:100%;

            padding:16px;

            border:none;

            border-radius:15px;

            background:#f1f5f9;

            font-size:16px;

            transition:0.3s;
        }

        input:focus{

            outline:none;

            background:white;

            box-shadow:0px 0px 10px rgba(36,59,85,0.4);
        }

        button{

            width:100%;

            padding:18px;

            border:none;

            border-radius:15px;

            background:
            linear-gradient(
                135deg,
                #141e30,
                #243b55
            );

            color:white;

            font-size:18px;

            cursor:pointer;

            transition:0.3s;
        }

        button:hover{

            transform:translateY(-3px);

            box-shadow:0px 8px 20px rgba(0,0,0,0.3);
        }

        .resultado{

            margin-top:40px;
        }

        .resultado h2{

            color:#243b55;

            margin-bottom:20px;

            text-align:center;
        }

        .cards{

            display:grid;

            grid-template-columns:1fr 1fr 1fr;

            gap:20px;
        }

        .card{

            background:#f8fafc;

            padding:20px;

            border-radius:20px;

            border-top:6px solid #243b55;

            transition:0.3s;
        }

        .card:hover{

            transform:scale(1.03);
        }

        .card h3{

            text-align:center;

            margin-bottom:15px;

            color:#141e30;
        }

        .card p{

            text-align:center;

            color:#333;

            line-height:1.6;
        }

        .footer{

            text-align:center;

            margin-top:35px;

            color:gray;

            font-size:14px;
        }

        @media(max-width:700px){

            .cards{

                grid-template-columns:1fr;
            }

            .panel{

                width:100%;
            }

        }

    </style>

</head>

<body>

<div class="panel">

    <div class="header">

        <h1>
            Tipos de busqueda
        </h1>

        <p>
        </p>

    </div>

    <div class="contenido">

        <form action="/buscar" method="POST">

            <div class="grupo">

                <label>
                    Ciudad Inicial
                </label>

                <input
                type="text"
                name="inicio"
                placeholder="Escribe ciudad inicial"
                required>

            </div>

            <div class="grupo">

                <label>
                    Ciudad Destino
                </label>

                <input
                type="text"
                name="destino"
                placeholder="Escribe ciudad destino"
                required>

            </div>

            <button type="submit">

                Buscar Ruta

            </button>

        </form>

        {% if resultados %}

        <div class="resultado">

            <h2>
                Resultados
            </h2>

            <div class="cards">

                <div class="card">

                    <h3>
                        BFS
                    </h3>

                    <p>
                        {{ resultados["bfs"] }}
                    </p>

                </div>

                <div class="card">

                    <h3>
                        DFS
                    </h3>

                    <p>
                        {{ resultados["dfs"] }}
                    </p>

                </div>

                <div class="card">

                    <h3>
                        UCS
                    </h3>

                    <p>
                        {{ resultados["ucs"] }}
                    </p>

                </div>

            </div>

        </div>

        {% endif %}

        <div class="footer">

        </div>

    </div>

</div>

</body>
</html>
