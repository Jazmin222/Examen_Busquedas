<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Busquedas</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            font-family: Arial, Helvetica, sans-serif;

            background: linear-gradient(
                135deg,
                #1e3c72,
                #2a5298
            );

            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;
        }

        .contenedor{

            width:700px;

            background:white;

            padding:40px;

            border-radius:20px;

            box-shadow:0px 10px 30px rgba(0,0,0,0.3);
        }

        h1{

            text-align:center;

            color:#1e3c72;

            margin-bottom:30px;

            font-size:35px;
        }

        .subtitulo{

            text-align:center;

            color:gray;

            margin-bottom:30px;
        }

        label{

            font-weight:bold;

            color:#333;

            margin-top:15px;

            display:block;
        }

        input{

            width:100%;

            padding:14px;

            margin-top:10px;

            border-radius:10px;

            border:2px solid #dcdcdc;

            font-size:16px;

            transition:0.3s;
        }

        input:focus{

            border-color:#2a5298;

            outline:none;

            box-shadow:0px 0px 10px rgba(42,82,152,0.3);
        }

        button{

            width:100%;

            padding:15px;

            margin-top:30px;

            border:none;

            border-radius:12px;

            background:linear-gradient(
                135deg,
                #1e3c72,
                #2a5298
            );

            color:white;

            font-size:18px;

            cursor:pointer;

            transition:0.3s;
        }

        button:hover{

            transform:scale(1.03);

            background:linear-gradient(
                135deg,
                #2a5298,
                #1e3c72
            );
        }

        .resultado{

            margin-top:35px;

            padding:25px;

            border-radius:15px;

            background:#f4f7ff;

            border-left:8px solid #2a5298;
        }

        .resultado h2{

            color:#1e3c72;

            margin-bottom:20px;
        }

        .card{

            background:white;

            padding:15px;

            margin-top:15px;

            border-radius:12px;

            box-shadow:0px 4px 10px rgba(0,0,0,0.1);
        }

        .card h3{

            color:#2a5298;

            margin-bottom:10px;
        }

        .card p{

            color:#333;

            font-size:16px;

            line-height:1.5;
        }

        .footer{

            text-align:center;

            margin-top:25px;

            color:gray;

            font-size:14px;
        }

    </style>

</head>

<body>

<div class="contenedor">

    <h1>
        Examen Tipos de Busquedas
    </h1>

    <p class="subtitulo">

        Comparación de algoritmos:
        BFS, DFS y UCS

    </p>

    <form method="POST">

        <label>

            Ciudad Inicial

        </label>

        <input
        type="text"
        name="inicio"
        placeholder=""
        required>

        <label>

            Ciudad Destino

        </label>

        <input
        type="text"
        name="destino"
        placeholder=""
        required>

        <button type="submit">

            Ejecutar Búsquedas

        </button>

    </form>

    {% if resultados %}

    <div class="resultado">

        <h2>
            Resultados Encontrados
        </h2>

        <div class="card">

            <h3>
                BFS
            </h3>

            <p>
                {{ resultados["bfs"] }}
            </p>

        </div>

        <div class="card">

            <h3>
                DFS
            </h3>

            <p>
                {{ resultados["dfs"] }}
            </p>

        </div>

        <div class="card">

            <h3>
                UCS
            </h3>

            <p>
                {{ resultados["ucs"] }}
            </p>

        </div>

    </div>

    {% endif %}

    <div class="footer">

        

    </div>

</div>

</body>
</html>
